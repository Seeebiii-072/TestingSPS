services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: securedesk
      POSTGRES_PASSWORD: securedesk
      POSTGRES_DB: securedesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securedesk -d securedesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://securedesk:securedesk@db:5432/securedesk}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql://securedesk:securedesk@db:5432/securedesk}
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-this-secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  email_worker:
    profiles:
      - email
    build: ./email_worker
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:8001}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
    depends_on:
      backend:
        condition: service_started
      mailhog:
        condition: service_started

  ai_service:
    profiles:
      - ai
    build: ./ai
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8001:8001"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
  uploads: