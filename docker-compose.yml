services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: securedesk
      POSTGRES_PASSWORD: securedesk
      POSTGRES_DB: securedesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securedesk -d securedesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      - MH_API_BIND_ADDR=0.0.0.0:8025
      - MH_SMTP_BIND_ADDR=0.0.0.0:1025
    restart: unless-stopped

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head 2>/dev/null; uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://securedesk:securedesk@db:5432/securedesk}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql://securedesk:securedesk@db:5432/securedesk}
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-this-secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEED_DEFAULT_USERS: ${SEED_DEFAULT_USERS:-false}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-api-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:5199,http://127.0.0.1:5199}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:8001}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  email_worker:
    build:
      context: ./email_worker
      dockerfile: Dockerfile
    environment:
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASSWORD=${IMAP_PASSWORD:-}
      - IMAP_POLL_INTERVAL_SECONDS=${IMAP_POLL_INTERVAL_SECONDS:-10}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-helpdesk@sps.com}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-SPS Helpdesk}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend:8000}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai_service:8001}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev-internal-api-key}
      - PORTAL_URL=${PORTAL_URL:-http://localhost:5173}
      - MESSAGE_STORE_PATH=${MESSAGE_STORE_PATH:-/app/email_worker/data}
    volumes:
      - email_worker_data:/app/email_worker/data
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      mailhog:
        condition: service_started

  ai_service:
    build: ./ai
    ports:
      - "8001:8001"
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: ${AI_CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:5199,http://127.0.0.1:5199}
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
  uploads:
  email_worker_data:
